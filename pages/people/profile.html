<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixPro - Mi Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 d-md-block sidebar collapse bg-dark" id="sidebar">
                <!-- Sidebar se cargará dinámicamente -->
            </div>
            
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="profile-header">
                    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3">
                        <h1 class="h2">Mi Perfil</h1>
                    </div>
                    
                    <ul class="nav nav-pills">
                        <li class="nav-item">
                            <a class="nav-link active" id="personal-tab" data-bs-toggle="pill" href="#personal-info">
                                <i class="bi bi-person-lines-fill me-1"></i>Información Personal
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="password-tab" data-bs-toggle="pill" href="#change-password">
                                <i class="bi bi-shield-lock me-1"></i>Cambiar Contraseña
                            </a>
                        </li>
                    </ul>
                </div>

                <div class="tab-content" id="profileTabsContent">
                    <!-- Sección de Información Personal -->
                    <div class="tab-pane fade show active" id="personal-info" role="tabpanel" aria-labelledby="personal-tab">
                        <div class="row justify-content-center">
                            <div class="col-lg-8">
                                <div class="card mb-4">
                                    <div class="card-header">
                                        <h5>Datos Personales</h5>
                                    </div>
                                    <div class="card-body">
                                        <form id="personalInfoForm">
                                            <div class="row mb-3">
                                                <div class="col-md-6">
                                                    <label for="name" class="form-label">Nombres</label>
                                                    <input type="text" class="form-control" id="name" value="" required>
                                                </div>
                                                <div class="col-md-6">
                                                    <label for="lastName" class="form-label">Apellidos</label>
                                                    <input type="text" class="form-control" id="lastName" value="" required>
                                                </div>
                                            </div>
                                            <div class="mb-3">
                                                <label for="email" class="form-label">Correo electrónico</label>
                                                <input type="email" class="form-control" id="email" value="" required>
                                            </div>
                                            <div class="mb-3">
                                                <label for="phone" class="form-label">Teléfono</label>
                                                <input type="tel" class="form-control" id="phone" value="">
                                            </div>
                                            <div class="mb-3">
                                                <label for="address" class="form-label">Dirección</label>
                                                <input type="text" class="form-control" id="address" value="">
                                            </div>
                                            <div class="row mb-3">
                                                <div class="col-md-6">
                                                    <label for="role" class="form-label">Rol</label>
                                                    <input type="text" class="form-control" id="role" value="" disabled>
                                                </div>
                                                <div class="col-md-6" id="specialtiesContainer">
                                                    <!-- Se mostrará solo para técnicos -->
                                                </div>
                                            </div>
                                            <button type="submit" class="btn btn-primary">
                                                <i class="bi bi-save me-1"></i> Guardar Cambios
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Sección de Cambio de Contraseña -->
                    <div class="tab-pane fade" id="change-password" role="tabpanel" aria-labelledby="password-tab">
                        <div class="row justify-content-center">
                            <div class="col-lg-6">
                                <div class="card">
                                    <div class="card-header">
                                        <h5>Cambiar Contraseña</h5>
                                    </div>
                                    <div class="card-body">
                                        <form id="changePasswordForm">
                                            <div class="mb-3">
                                                <label for="currentPassword" class="form-label">Contraseña Actual</label>
                                                <input type="password" class="form-control" id="currentPassword" required>
                                            </div>
                                            <div class="mb-3">
                                                <label for="newPassword" class="form-label">Nueva Contraseña</label>
                                                <input type="password" class="form-control" id="newPassword" required>
                                                <small class="text-muted">La contraseña debe tener al menos 8 caracteres</small>
                                            </div>
                                            <div class="mb-3">
                                                <label for="confirmPassword" class="form-label">Confirmar Nueva Contraseña</label>
                                                <input type="password" class="form-control" id="confirmPassword" required>
                                            </div>
                                            <button type="submit" class="btn btn-primary">
                                                <i class="bi bi-key me-1"></i> Cambiar Contraseña
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/public/assets/js/main.js"></script>
    <script type="module" src="/public/assets/js/modules/profile.js" defer></script>
</body>
</html>
