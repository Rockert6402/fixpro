spring.application.name=FixPro
spring.datasource.url=jdbc:mysql://localhost:3306/fixpro_db?allowPublicKeyRetrieval=true&useSSL=false

# Usuario y contraseÒa de MySQL
spring.datasource.username=root
spring.datasource.password=123456789

# Driver de MySQL (Spring Boot 3+ lo detecta autom·ticamente, pero puedes especificarlo)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ConfiguraciÛn de Hibernate (JPA)
spring.jpa.hibernate.ddl-auto=update
