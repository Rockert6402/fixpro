<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixPro - Iniciar Sesión</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/assets/css/components/login.css">
</head>

<body>
    <div class="login-container">
        <div class="logo-container">
            <i class="bi bi-tools logo-icon"></i>
            <div class="logo-text">FIXPRO</div>
        </div>

        <h1>Accede a tu cuenta</h1>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="tu@email.com" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <div class="password-container">
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" id="showPassword">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="login-button">
                <span id="loginText">Iniciar Sesión</span>
                <div id="spinner" class="spinner hidden">
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden"></span>
                    </div>
                </div>
            </button>
        </form>

        <div id="errorMessage" class="error-message"></div>
    </div>
    <script type="module" src="/assets/js/modules/login.js" defer></script>
</body>
</html>
